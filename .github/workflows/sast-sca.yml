name: Secure CI Pipeline (SAST & SCA)

on:
  push: 
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  sonar-scan-backend:
    name: Run SonarQube Cloud Analysis for backend project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with: 
          distribution: 'temurin'
          java-version: '17'

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with: 
          dotnet-version: '10.0'

      - name: Install SonarScanner Tool
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Build and Analyze
        env: 
          PROJECT_KEY: ${{ secrets.BACKEND_PROJECT_KEY }}
          ORGANIZATION_KEY: ${{ secrets.ORGANIZATION_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 

        run: |
          dotnet-sonarscanner begin \
            /k:"$PROJECT_KEY" \
            /o:"$ORGANIZATION_KEY" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.qualitygate.wait=true

          dotnet build UHBAPI/UHB.sln --configuration Release

          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  sonar-scan-frontend:
    name: Run SonarQube Cloud Analysis on frontend project
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with: 
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run SonarQube Cloud Scan
        uses: docker/build-push-action@v5
        with: 
          context: ./UHBUI
          target: sonar
          push: false
          build-args: |
            SONAR_HOST_URL=https://sonarcloud.io
            SONAR_TOKEN=${{ secrets.SONAR_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      
