name: Secure CI Pipeline (SAST & SCA)

on:
  push: 
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  backend-sast-scan:
    name: Run SAST Analysis for backend project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with: 
          distribution: 'temurin'
          java-version: '17'

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with: 
          dotnet-version: '10.0'

      - name: Install SonarScanner Tool
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Build and Analyze
        working-directory: ./UHBAPI
        env: 
          PROJECT_KEY: ${{ secrets.BACKEND_PROJECT_KEY }}
          ORGANIZATION_KEY: ${{ secrets.ORGANIZATION_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 

        run: |
          dotnet-sonarscanner begin \
            /k:"$PROJECT_KEY" \
            /o:"$ORGANIZATION_KEY" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.qualitygate.wait=true

          dotnet build UHB.sln --configuration Release

          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  frontend-sast-scan:
    name: Run SAST Analysis on frontend project
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with: 
          fetch-depth: 0

      - name: Set up Node Js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e

      - name: Install dependencies
        run: npm ci
        working-directory: ./UHBUI

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        with:
          projectBaseDir: ./UHBUI
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io 
          SONAR_PROJECT_KEY: ${{ secrets.FRONTEND_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.ORGANIZATION_KEY }}

  build-backend-image:
    name: Build Backend Image
    needs: backend-sast-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with: 
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: ./UHBAPI
          file: ./UHBAPI/UHB/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/UHB-backend:${{ github.sha }}

  build_frontend_image: 
    name: Build Frontend Image
    needs: frontend-sast-scan
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with: 
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: ./UHBUI
          file: ./UHBUI/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/UHB-frontend:${{ github.sha }}

  backend-sca-scan:
    name: Backend SCA Image scan
    needs: build-backend-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with: 
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          
      - name: Scan pushed backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with: 
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/UHB-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-backend-image-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: 1

      - name: Upload backend results to GitHub
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496
        if: always()
        with:
          sarif-file: 'trivy-backend-image-results.sarif'
          category: 'trivy-backend-image'

  frontend-sca-scan:
    name: Frontend SCA image scan (Trivy)
    needs: build_frontend_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with: 
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Scan pushed frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with: 
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/UHB-frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-frontend-image-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: 1

      - name: Upload fs results to GitHub
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496
        if: always()
        with:
          sarif-file: 'trivy-frontend-image-results.sarif'
          category: 'trivy-frontend-image'