name: Secure CI Pipeline (SAST & SCA)

on:
  push: 
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  sonar-scan-backend:
    name: Run SonarQube Cloud Analysis for backend project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with: 
          distribution: 'temurin'
          java-version: '17'

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with: 
          dotnet-version: '10.0'

      - name: Install SonarScanner Tool
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Build and Analyze
        env: 
          PROJECT_KEY: ${{ secrets.BACKEND_PROJECT_KEY }}
          ORGANIZATION_KEY: ${{ secrets.ORGANIZATION_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 

        run: |
          dotnet-sonarscanner begin \
            /k:"$PROJECT_KEY" \
            /o:"$ORGANIZATION_KEY" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            # /d:sonar.qualitygate.wait=true

          dotnet build UHBAPI/UHB.sln --configuration Release

          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  sonar-scan-frontend:
    name: Run SonarQube Cloud Analysis on frontend project
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with: 
          fetch-depth: 0

      - name: Set up Node Js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e

      - name: Install dependencies
        run: npm ci
        working-directory: ./UHBUI

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        with:
          projectBaseDir: ./UHBUI
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io 
          SONAR_PROJECT_KEY: ${{ secrets.FRONTEND_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.ORGANIZATION_KEY }}